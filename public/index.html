<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO99 :: GRID</title>
    <link rel="stylesheet" href="/vendor/xterm/xterm.css">
    <link rel="stylesheet" href="/css/grid.css">
</head>
<body>
    <div class="grid-shell">

        <!-- ============================================ -->
        <!-- TOP STATUS BAR                                -->
        <!-- ============================================ -->
        <header class="bar-top">
            <div class="brand">NEO99 :: GRID</div>
            <div class="operator">
                <span class="label">Operator:</span>CygnusWildstar
            </div>
        </header>

        <!-- ============================================ -->
        <!-- MAIN — terminal pane + feed pane              -->
        <!-- ============================================ -->
        <main class="main">

            <!-- ----- Terminal pane (left) ----- -->
            <section class="terminal-pane">
                <div class="pane-header">
                    <span class="title">// Operator Terminal</span>
                    <span>
                        <span class="indicator"></span>
                    </span>
                </div>

                <!-- xterm.js mounts here. We'll keep the .terminal-placeholder
                     class off it now since xterm provides its own styling. -->
                <div id="terminal"></div>
            </section>

            <!-- ----- Feed pane (right) ----- -->
             <aside class="feed-pane">
                <!-- Populated dynamically by /js/feeds.js -->
            </aside>

        </main>

        <!-- ============================================ -->
        <!-- BOTTOM STATUS BAR                             -->
        <!-- ============================================ -->
        <footer class="bar-bottom">
            <div class="stat">
                <span class="label">Status:</span><span class="value">online</span>
            </div>
            <div class="stat">
                <span class="label">Uptime:</span><span class="value" id="uptime">0d 0h 0m</span>
            </div>
            <div class="stat">
                <span class="label">Visitors:</span><span class="value" id="visitors">1</span>
            </div>
            <div class="stat" style="text-align: right;">
                <span class="label">Time:</span><span class="value" id="clock">--:--:--</span>
            </div>
        </footer>

    </div>

    <!-- Third-party: xterm.js + addons -->
    <script src="/vendor/xterm/xterm.js"></script>
    <script src="/vendor/xterm/addon-fit.js"></script>
    <script src="/vendor/xterm/addon-web-links.js"></script>

    <!-- First-party: our app code -->
    <script src="/js/clock.js"></script>
    <script src="/js/feeds.js"></script>
    <script src="/js/console.js"></script>
</body>
</html>
